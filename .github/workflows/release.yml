name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-26

    permissions:
      contents: write

    env:
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: ci-temp-password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 1800 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')

          rm /tmp/cert.p12

      - name: Build and sign archive
        run: |
          xcodebuild archive \
            -project SpillAura.xcodeproj \
            -scheme SpillAura \
            -configuration Release \
            -archivePath build/SpillAura.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_NAME"

      - name: Create DMG
        run: |
          TAG="${{ github.ref_name }}"
          APP_PATH="build/SpillAura.xcarchive/Products/Applications/SpillAura.app"
          DMG_NAME="SpillAura-${TAG}.dmg"

          mkdir -p dmg_staging
          cp -r "$APP_PATH" dmg_staging/SpillAura.app
          ln -s /Applications dmg_staging/Applications

          hdiutil create \
            -volname "SpillAura" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "$DMG_NAME"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
